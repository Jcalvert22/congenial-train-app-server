<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Around Athlete</title>
  <link rel="stylesheet" href="./styles/main.css" />
  <link id="aaa-landing-styles" rel="stylesheet" href="./styles/landing.css" />
  <link rel="stylesheet" href="./styles/summary.css" />
</head>
<body>
  <div id="navbar"></div>
  <div id="app"></div>

  <script type="module" src="./app.mjs"></script>
  <script type="module">
    import { startCheckout } from '/js/checkout.js';

    document.addEventListener('click', event => {
      const checkoutTarget = event.target.closest('[data-checkout-plan], #start-trial');
      if (!checkoutTarget) {
        return;
      }
      event.preventDefault();
      const plan = checkoutTarget.getAttribute('data-checkout-plan') || 'monthly';
      startCheckout(plan);
    });
  </script>
</body>
</html>
