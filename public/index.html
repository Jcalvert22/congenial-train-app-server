<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Around Athlete</title>
  <link rel="stylesheet" href="./styles/main.css" />
  <link id="aaa-landing-styles" rel="stylesheet" href="./styles/landing.css" />
  <link rel="stylesheet" href="./styles/summary.css" />
</head>
<body>
  <div id="navbar"></div>
  <div id="app"></div>

  <script type="module" src="./app.mjs"></script>
  <script type="module">
    import { startCheckout, setTrialPlan } from '/js/checkout.js';

    document.addEventListener('click', async event => {
      const trialButton = event.target.closest('#start-trial');
      if (trialButton) {
        event.preventDefault();
        if (trialButton.disabled) {
          return;
        }
        const plan = (trialButton.dataset.plan || 'monthly').trim() || 'monthly';
        console.log('Top-right trial button plan:', plan);
        trialButton.disabled = true;
        try {
          await startCheckout(plan);
        } finally {
          trialButton.disabled = false;
        }
        return;
      }

      const checkoutTarget = event.target.closest('[data-checkout-plan]');
      if (!checkoutTarget) {
        return;
      }
      event.preventDefault();
      const plan = (checkoutTarget.getAttribute('data-checkout-plan') || 'monthly').trim() || 'monthly';
      setTrialPlan(plan);
      startCheckout(plan);
    });
  </script>
</body>
</html>
