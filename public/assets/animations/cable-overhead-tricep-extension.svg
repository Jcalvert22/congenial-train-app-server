<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Cable machine column (low pulley behind person) -->
  <rect x="10" y="20" width="12" height="150" rx="6" fill="#4FAF52"/>
  <!-- Low pulley -->
  <circle cx="16" cy="158" r="6" fill="#7CCF7A"/>

  <!-- Cable from low pulley to hand (animated) -->
  <line x1="16" y1="158" x2="60" y2="62" stroke="#7CCF7A" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x2" values="60;88;88;60"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="62;14;14;62"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Leg (centered under torso) -->
  <line x1="98" y1="130" x2="96" y2="170" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <!-- Torso (upright, facing right — back to machine) -->
  <rect x="90" y="66" width="16" height="64" rx="8" fill="#7CCF7A"/>
  <!-- Head (facing right) -->
  <circle cx="104" cy="54" r="12" fill="#7CCF7A"/>

  <!-- Upper arm (raised overhead, static — elbow points up, leans slightly toward machine) -->
  <line x1="92" y1="76" x2="88" y2="44" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>

  <!-- Forearm (bends from behind head → extends straight overhead) -->
  <line x1="88" y1="44" x2="60" y2="62" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="60;88;88;60"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="62;14;14;62"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Handle at hand position -->
  <rect width="12" height="8" rx="4" fill="#4FAF52">
    <animate attributeName="x" values="54;82;82;54"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y" values="58;10;10;58"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </rect>
</svg>
