<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Leg -->
  <line x1="112" y1="118" x2="108" y2="170" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <!-- Torso (side profile) -->
  <rect x="102" y="50" width="18" height="68" rx="9" fill="#7CCF7A"/>
  <!-- Head (facing right) -->
  <circle cx="118" cy="38" r="12" fill="#7CCF7A"/>

  <!-- Upper arm (static — hangs from front/right edge of torso) -->
  <line x1="120" y1="64" x2="120" y2="108" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <!-- Forearm -->
  <line x1="120" y1="108" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="148;144;144;148" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="140;70;70;140" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Dumbbell (full vertical — neutral/hammer grip, thumb pointing up) -->
  <!-- Group centered on hand position, translates with the arm -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="148,140;144,70;144,70;148,140"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Top plate -->
    <rect x="-7" y="-21" width="14" height="12" rx="5" fill="#7CCF7A"/>
    <!-- Handle -->
    <rect x="-3" y="-9" width="6" height="18" rx="3" fill="#4FAF52"/>
    <!-- Bottom plate -->
    <rect x="-7" y="9" width="14" height="12" rx="5" fill="#7CCF7A"/>
  </g>
</svg>
