<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Machine column -->
  <rect x="92" y="10" width="16" height="136" rx="8" fill="#4FAF52"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Seat -->
  <rect x="62" y="148" width="76" height="14" rx="7" fill="#7CCF7A"/>
  <!-- Thigh restraint pad -->
  <rect x="62" y="132" width="76" height="18" rx="9" fill="#4FAF52"/>
  <!-- Torso -->
  <rect x="86" y="84" width="28" height="50" rx="14" fill="#7CCF7A"/>
  <!-- Head -->
  <circle cx="100" cy="74" r="12" fill="#7CCF7A"/>

  <!-- Left arm (extends up, pulls down to chin) -->
  <line x1="88" y1="96" x2="52" y2="32" stroke="#4FAF52" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="52;64;64;52"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="32;80;80;32"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Right arm (extends up, pulls down to chin) -->
  <line x1="112" y1="96" x2="148" y2="32" stroke="#4FAF52" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="148;136;136;148"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="32;80;80;32"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Bar + weights (animated down) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,48; 0,48; 0,0"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Shaft -->
    <rect x="50" y="26" width="100" height="10" rx="5" fill="#4FAF52"/>
    <!-- Left weight -->
    <rect x="28" y="16" width="24" height="30" rx="8" fill="#7CCF7A"/>
    <!-- Right weight -->
    <rect x="148" y="16" width="24" height="30" rx="8" fill="#7CCF7A"/>
  </g>
</svg>
