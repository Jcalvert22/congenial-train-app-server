<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Smith machine frame -->
  <!-- Left vertical post -->
  <rect x="22" y="18" width="14" height="156" rx="7" fill="#4FAF52"/>
  <!-- Right vertical post -->
  <rect x="164" y="18" width="14" height="156" rx="7" fill="#4FAF52"/>
  <!-- Top cross bar -->
  <rect x="22" y="16" width="156" height="14" rx="7" fill="#7CCF7A"/>

  <!-- Rails (inner guides) -->
  <rect x="38" y="18" width="6" height="140" rx="3" fill="#A4E6A3" opacity="0.6"/>
  <rect x="156" y="18" width="6" height="140" rx="3" fill="#A4E6A3" opacity="0.6"/>

  <!-- Person — body moves down as squat deepens -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,36; 0,36; 0,0"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Head -->
    <circle cx="100" cy="46" r="12" fill="#7CCF7A"/>
    <!-- Torso -->
    <rect x="86" y="58" width="28" height="52" rx="14" fill="#7CCF7A"/>
  </g>

  <!-- Barbell on smith rails (animated down with person) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,36; 0,36; 0,0"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <rect x="36" y="104" width="128" height="10" rx="5" fill="#4FAF52"/>
    <!-- Left collar/plate -->
    <rect x="24" y="96" width="14" height="26" rx="5" fill="#7CCF7A"/>
    <!-- Right collar/plate -->
    <rect x="162" y="96" width="14" height="26" rx="5" fill="#7CCF7A"/>
  </g>

  <!-- Legs (path animates between standing and squatted) -->
  <path d="M 92 108 L 80 172 L 60 172" fill="none" stroke="#4FAF52" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="d"
      values="M 92 108 L 80 172 L 60 172; M 92 144 L 66 158 L 50 172; M 92 144 L 66 158 L 50 172; M 92 108 L 80 172 L 60 172"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </path>
  <path d="M 108 108 L 120 172 L 140 172" fill="none" stroke="#7CCF7A" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="d"
      values="M 108 108 L 120 172 L 140 172; M 108 144 L 134 158 L 150 172; M 108 144 L 134 158 L 150 172; M 108 108 L 120 172 L 140 172"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </path>
</svg>
