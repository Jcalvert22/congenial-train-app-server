<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>

  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Bench support legs -->
  <rect x="118" y="148" width="12" height="22" rx="5" fill="#4FAF52"/>
  <rect x="138" y="154" width="10" height="16" rx="5" fill="#4FAF52"/>

  <!-- Bench pad (incline ~35°, from lower-right to upper-left) -->
  <line x1="132" y1="148" x2="42" y2="90" stroke="#4FAF52" stroke-width="16" stroke-linecap="round"/>

  <!-- Person torso along bench -->
  <line x1="118" y1="140" x2="56" y2="100" stroke="#7CCF7A" stroke-width="18" stroke-linecap="round"/>

  <!-- Head (overlaps torso top end — no neck) -->
  <circle cx="46" cy="86" r="11" fill="#7CCF7A"/>

  <!-- Working arm: upper segment (shoulder to elbow — elbow drives back/up toward hip) -->
  <line x1="80" y1="112" stroke="#4FAF52" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="76;90;90;76" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="138;90;90;138" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Working arm: forearm (elbow to hand — hangs down from elbow) -->
  <line stroke="#4FAF52" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="76;90;90;76" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y1" values="138;90;90;138" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="x2" values="74;82;82;74" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="162;116;116;162" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Dumbbell left plate -->
  <rect x="62" y="154" width="8" height="18" rx="4" fill="#7CCF7A">
    <animateTransform attributeName="transform" type="translate" values="0,0;8,-46;8,-46;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1" additive="sum"/>
  </rect>
  <!-- Dumbbell shaft -->
  <rect x="69" y="158" width="12" height="8" rx="3" fill="#4FAF52">
    <animateTransform attributeName="transform" type="translate" values="0,0;8,-46;8,-46;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1" additive="sum"/>
  </rect>
  <!-- Dumbbell right plate -->
  <rect x="80" y="154" width="8" height="18" rx="4" fill="#7CCF7A">
    <animateTransform attributeName="transform" type="translate" values="0,0;8,-46;8,-46;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1" additive="sum"/>
  </rect>
</svg>
