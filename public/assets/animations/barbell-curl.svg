<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Leg -->
  <line x1="112" y1="118" x2="108" y2="170" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <!-- Torso (side profile) -->
  <rect x="102" y="50" width="18" height="68" rx="9" fill="#7CCF7A"/>
  <!-- Head (facing right) -->
  <circle cx="118" cy="38" r="12" fill="#7CCF7A"/>

  <!-- Upper arm (static — hangs from front/right edge of torso) -->
  <line x1="120" y1="64" x2="120" y2="108" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <!-- Forearm (hangs forward-down, curls to offset-V at top) -->
  <line x1="120" y1="108" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="152;144;144;152" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="160;70;70;160" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Barbell group — moves with arm, stays clear of body -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;-8,-90;-8,-90;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Near plate (toward viewer) -->
    <circle cx="152" cy="160" r="11" fill="#7CCF7A"/>
    <!-- Shaft (extends forward from hand) -->
    <rect x="152" y="156" width="22" height="8" rx="4" fill="#4FAF52"/>
    <!-- Far plate -->
    <rect x="172" y="148" width="14" height="24" rx="6" fill="#7CCF7A" opacity="0.8"/>
  </g>
</svg>
