<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>

  <!--
    VIEW: Head-end of bench looking toward feet.
    Dumbbell bench press — two separate dumbbells press upward from chest.
    Head centered; arms press symmetrically; motion is clear.
  -->

  <!-- Bench pad -->
  <rect x="86" y="118" width="28" height="74" rx="8" fill="#7CCF7A"/>

  <!-- Head (centered) -->
  <circle cx="100" cy="144" r="13" fill="#7CCF7A"/>

  <!-- Chest / upper-body block -->
  <rect x="68" y="100" width="64" height="40" rx="14" fill="#4FAF52"/>

  <!-- Left arm -->
  <line x1="68" y1="113" x2="38" y2="90" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="y2" values="90;58;58;90"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Right arm -->
  <line x1="132" y1="113" x2="162" y2="90" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="y2" values="90;58;58;90"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Left dumbbell (follows left wrist, translates UP 32px when pressed) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-32; 0,-32; 0,0"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <rect x="29" y="86" width="18" height="8" rx="4" fill="#4FAF52"/>
    <rect x="21" y="80" width="10" height="20" rx="5" fill="#7CCF7A"/>
    <rect x="45" y="80" width="10" height="20" rx="5" fill="#7CCF7A"/>
  </g>

  <!-- Right dumbbell (follows right wrist, translates UP 32px when pressed) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-32; 0,-32; 0,0"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <rect x="153" y="86" width="18" height="8" rx="4" fill="#4FAF52"/>
    <rect x="145" y="80" width="10" height="20" rx="5" fill="#7CCF7A"/>
    <rect x="169" y="80" width="10" height="20" rx="5" fill="#7CCF7A"/>
  </g>
</svg>
