<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Body + dumbbell in FRONT (left side, person faces left) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-6; 0,-6; 0,0"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <circle cx="100" cy="46" r="12" fill="#7CCF7A"/>
    <rect x="92" y="58" width="16" height="52" rx="8" fill="#7CCF7A"/>
    <!-- Arm on front (left/forward) side with dumbbell -->
    <line x1="94" y1="68" x2="80" y2="108" stroke="#7CCF7A" stroke-width="10" stroke-linecap="round"/>
    <circle cx="80" cy="116" r="10" fill="#A4E6A3"/>
    <!-- Thigh -->
    <line x1="100" y1="108" x2="104" y2="144" stroke="#4FAF52" stroke-width="13" stroke-linecap="round"/>
    <!-- Lower leg -->
    <line x1="104" y1="144" x2="108" y2="162" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- Foot: heel(right) - ankle - toe(left), heel rises -->
  <path d="M 126 174 L 108 162 L 92 174" fill="none" stroke="#4FAF52" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="d"
      values="M 126 174 L 108 162 L 92 174; M 122 158 L 108 156 L 92 174; M 122 158 L 108 156 L 92 174; M 126 174 L 108 162 L 92 174"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </path>
</svg>
