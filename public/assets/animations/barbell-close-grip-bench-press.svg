<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Rack upright (head end, left) -->
  <rect x="18" y="22" width="10" height="120" rx="4" fill="#4FAF52"/>
  <!-- J-hook -->
  <rect x="18" y="52" width="20" height="8" rx="3" fill="#7CCF7A"/>

  <!-- Bench legs -->
  <rect x="28" y="154" width="12" height="16" rx="4" fill="#4FAF52"/>
  <rect x="160" y="154" width="12" height="16" rx="4" fill="#4FAF52"/>
  <!-- Bench surface -->
  <rect x="26" y="138" width="148" height="16" rx="7" fill="#7CCF7A"/>

  <!-- Person lying on bench (body + head at left toward rack) -->
  <rect x="42" y="124" width="128" height="14" rx="7" fill="#7CCF7A"/>
  <circle cx="38" cy="128" r="12" fill="#7CCF7A"/>

  <!-- Arm — single line, no elbow (close grip = arm nearly vertical) -->
  <line x1="86" y1="124" x2="86" y2="56" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="y2" values="56;124;124;56"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Barbell plate (bar goes into screen — only the plate face is visible from this angle) -->
  <circle cx="86" r="16" fill="#7CCF7A">
    <animate attributeName="cy" values="56;124;124;56"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </circle>
</svg>
