<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Bench seat (dark) -->
  <rect x="76" y="140" width="48" height="14" rx="7" fill="#4FAF52"/>
  <!-- Backrest (dark — contrasts with light head) -->
  <rect x="80" y="52" width="40" height="90" rx="10" fill="#4FAF52"/>

  <!-- V-shape legs spreading from seat to floor -->
  <line x1="80" y1="150" x2="60" y2="170" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <line x1="120" y1="150" x2="140" y2="170" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>

  <!-- Torso (renders over backrest) -->
  <rect x="86" y="80" width="28" height="62" rx="14" fill="#7CCF7A"/>
  <!-- Head (light — contrasts with dark backrest) -->
  <circle cx="100" cy="68" r="12" fill="#7CCF7A"/>

  <!-- Left arm -->
  <line x1="88" y1="94" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="52;68;68;52" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="92;34;34;92" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>
  <!-- Right arm -->
  <line x1="112" y1="94" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="148;132;132;148" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="92;34;34;92" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Left dumbbell (centered at ~(52,92), translate +16,-58) -->
  <rect x="38" y="83" width="8" height="18" rx="4" fill="#7CCF7A">
    <animateTransform attributeName="transform" type="translate" values="0,0;16,-58;16,-58;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1" additive="sum"/>
  </rect>
  <rect x="45" y="88" width="14" height="8" rx="3" fill="#4FAF52">
    <animateTransform attributeName="transform" type="translate" values="0,0;16,-58;16,-58;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1" additive="sum"/>
  </rect>
  <rect x="58" y="83" width="8" height="18" rx="4" fill="#7CCF7A">
    <animateTransform attributeName="transform" type="translate" values="0,0;16,-58;16,-58;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1" additive="sum"/>
  </rect>

  <!-- Right dumbbell (centered at ~(148,92), translate -16,-58) -->
  <rect x="134" y="83" width="8" height="18" rx="4" fill="#7CCF7A">
    <animateTransform attributeName="transform" type="translate" values="0,0;-16,-58;-16,-58;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1" additive="sum"/>
  </rect>
  <rect x="141" y="88" width="14" height="8" rx="3" fill="#4FAF52">
    <animateTransform attributeName="transform" type="translate" values="0,0;-16,-58;-16,-58;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1" additive="sum"/>
  </rect>
  <rect x="154" y="83" width="8" height="18" rx="4" fill="#7CCF7A">
    <animateTransform attributeName="transform" type="translate" values="0,0;-16,-58;-16,-58;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1" additive="sum"/>
  </rect>
</svg>
