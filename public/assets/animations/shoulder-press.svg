<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Machine back pad -->
  <rect x="86" y="38" width="28" height="108" rx="14" fill="#7CCF7A"/>
  <!-- Seat -->
  <rect x="62" y="144" width="76" height="14" rx="7" fill="#7CCF7A"/>
  <!-- Torso -->
  <rect x="88" y="88" width="24" height="56" rx="12" fill="#4FAF52"/>
  <!-- Head -->
  <circle cx="100" cy="78" r="12" fill="#7CCF7A"/>

  <!-- Left arm (presses from ear height to overhead) -->
  <line x1="88" y1="100" x2="54" y2="86" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="54;62;62;54"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="86;38;38;86"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Right arm (presses from ear height to overhead) -->
  <line x1="112" y1="100" x2="146" y2="86" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="146;138;138;146"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="86;38;38;86"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Handle bar (animated up) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-48; 0,-48; 0,0"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <rect x="44" y="80" width="22" height="12" rx="6" fill="#A4E6A3"/>
    <rect x="134" y="80" width="22" height="12" rx="6" fill="#A4E6A3"/>
    <rect x="62" y="82" width="76" height="8" rx="4" fill="#4FAF52"/>
  </g>
</svg>
