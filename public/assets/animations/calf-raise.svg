<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Step edge -->
  <rect x="46" y="150" width="108" height="24" rx="8" fill="#7CCF7A"/>
  <rect x="40" y="144" width="120" height="10" rx="5" fill="#4FAF52"/>

  <!-- Person — body rises slightly as heels lift -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-12; 0,-12; 0,0"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Head -->
    <circle cx="100" cy="52" r="12" fill="#7CCF7A"/>
    <!-- Torso -->
    <rect x="86" y="64" width="28" height="56" rx="14" fill="#7CCF7A"/>
    <!-- Thighs / upper legs -->
    <line x1="92" y1="118" x2="84" y2="146" stroke="#4FAF52" stroke-width="13" stroke-linecap="round"/>
    <line x1="108" y1="118" x2="116" y2="146" stroke="#4FAF52" stroke-width="13" stroke-linecap="round"/>
  </g>

  <!-- Left lower leg (stays grounded at ball of foot, heel rises) -->
  <line x1="84" y1="146" x2="80" y2="154" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <!-- Left foot (heel animates up, toe stays on step) -->
  <path d="M 62 154 L 80 154 L 80 162" fill="none" stroke="#4FAF52" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="d"
      values="M 62 154 L 80 154 L 80 162; M 66 142 L 80 154 L 80 162; M 66 142 L 80 154 L 80 162; M 62 154 L 80 154 L 80 162"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </path>

  <!-- Right lower leg -->
  <line x1="116" y1="146" x2="120" y2="154" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <!-- Right foot -->
  <path d="M 120 154 L 138 154 L 138 162" fill="none" stroke="#4FAF52" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="d"
      values="M 120 154 L 138 154 L 138 162; M 124 142 L 138 154 L 138 162; M 124 142 L 138 154 L 138 162; M 120 154 L 138 154 L 138 162"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </path>
</svg>
