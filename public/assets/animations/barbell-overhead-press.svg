<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- V-shape legs spreading from hip to floor -->
  <line x1="95" y1="116" x2="78" y2="170" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <line x1="105" y1="116" x2="122" y2="170" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <!-- Torso -->
  <rect x="87" y="52" width="26" height="64" rx="13" fill="#7CCF7A"/>
  <!-- Head (overlaps torso top) -->
  <circle cx="100" cy="40" r="12" fill="#7CCF7A"/>

  <!-- Left arm (presses bar from shoulder level to overhead) -->
  <line x1="88" y1="68" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="60;68;68;60" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="68;22;22;68" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>
  <!-- Right arm -->
  <line x1="112" y1="68" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="140;132;132;140" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="68;22;22;68" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Barbell (animates from shoulder height to overhead) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-46;0,-46;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Shaft -->
    <rect x="50" y="64" width="100" height="8" rx="4" fill="#4FAF52"/>
    <!-- Left plate -->
    <rect x="22" y="56" width="30" height="24" rx="6" fill="#7CCF7A"/>
    <!-- Right plate -->
    <rect x="148" y="56" width="30" height="24" rx="6" fill="#7CCF7A"/>
  </g>
</svg>
