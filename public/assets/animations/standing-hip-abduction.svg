<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Machine/anchor post (left side) -->
  <rect x="18" y="16" width="10" height="158" rx="5" fill="#4FAF52"/>
  <!-- Head -->
  <circle cx="100" cy="44" r="12" fill="#7CCF7A"/>
  <!-- Torso -->
  <rect x="92" y="56" width="16" height="56" rx="8" fill="#7CCF7A"/>
  <!-- Left arm reaching to post for balance -->
  <line x1="92" y1="74" x2="28" y2="80" stroke="#4FAF52" stroke-width="10" stroke-linecap="round"/>
  <!-- Right arm at side (shows person faces forward) -->
  <line x1="108" y1="74" x2="118" y2="104" stroke="#4FAF52" stroke-width="10" stroke-linecap="round"/>
  <!-- Support leg (left, static) -->
  <line x1="100" y1="112" x2="88" y2="174" stroke="#4FAF52" stroke-width="13" stroke-linecap="round"/>
  <!-- Resistance band (from post anchor to working ankle) -->
  <line x1="28" y1="166" x2="112" y2="174" stroke="#7CCF7A" stroke-width="4" stroke-linecap="round">
    <animate attributeName="x2" values="112;156;156;112"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="174;150;150;174"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>
  <!-- Working leg (right, lifts away from post) -->
  <line x1="100" y1="112" x2="112" y2="174" stroke="#4FAF52" stroke-width="13" stroke-linecap="round">
    <animate attributeName="x2" values="112;156;156;112"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="174;150;150;174"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>
  <!-- Ankle strap on working leg -->
  <circle cx="112" cy="174" r="8" fill="#A4E6A3">
    <animate attributeName="cx" values="112;156;156;112"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="cy" values="174;150;150;174"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </circle>
</svg>
