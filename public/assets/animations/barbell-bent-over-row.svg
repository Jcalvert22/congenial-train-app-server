<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>

  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Leg (centered under hip) -->
  <rect x="90" y="116" width="14" height="54" rx="7" fill="#4FAF52"/>

  <!-- Torso (flat back, hinged ~45° forward, hip centered between legs at ~97) -->
  <line x1="97" y1="114" x2="62" y2="80" stroke="#7CCF7A" stroke-width="22" stroke-linecap="round"/>

  <!-- Head (overlaps torso top — no neck) -->
  <circle cx="50" cy="68" r="12" fill="#7CCF7A"/>

  <!-- Arm -->
  <line x1="66" y1="84" stroke="#4FAF52" stroke-width="11" stroke-linecap="round">
    <animate attributeName="x2" values="66;66;66;66" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="150;100;100;150" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Barbell (end-on circle) -->
  <circle cx="66" cy="150" r="9" fill="#7CCF7A">
    <animate attributeName="cy" values="150;100;100;150" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </circle>
</svg>
