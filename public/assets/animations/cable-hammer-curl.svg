<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Cable machine column (full height, low pulley) -->
  <rect x="10" y="18" width="12" height="152" rx="6" fill="#4FAF52"/>
  <!-- Low pulley -->
  <circle cx="16" cy="160" r="6" fill="#7CCF7A"/>

  <!-- Leg (side view) -->
  <line x1="96" y1="118" x2="102" y2="170" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <!-- Torso (narrow side profile) -->
  <rect x="85" y="50" width="16" height="68" rx="8" fill="#7CCF7A"/>
  <!-- Head (offset left — facing toward machine) -->
  <circle cx="84" cy="38" r="12" fill="#7CCF7A"/>

  <!-- Cable from low pulley to hand -->
  <line x1="16" y1="160" stroke="#7CCF7A" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x2" values="62;74;74;62" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="150;68;68;150" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Upper arm (static — hangs straight down from shoulder) -->
  <line x1="93" y1="64" x2="93" y2="108" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <!-- Forearm (curls from reaching toward pulley to raised near face) -->
  <line x1="93" y1="108" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="62;74;74;62" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="150;68;68;150" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>
  <!-- Rope handle (vertical rect = neutral/thumb-up grip) -->
  <rect width="8" height="16" rx="3" fill="#4FAF52">
    <animate attributeName="x" values="58;70;70;58" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y" values="142;60;60;142" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </rect>
</svg>
