<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Incline bench (drawn first so person renders on top) -->
  <!-- Seat -->
  <rect x="28" y="148" width="64" height="14" rx="7" fill="#4FAF52"/>
  <!-- Front leg -->
  <line x1="38" y1="162" x2="38" y2="170" stroke="#4FAF52" stroke-width="10" stroke-linecap="round"/>
  <!-- Rear leg -->
  <line x1="78" y1="162" x2="78" y2="170" stroke="#4FAF52" stroke-width="10" stroke-linecap="round"/>
  <!-- Back support (angled ~50°) -->
  <line x1="78" y1="154" x2="130" y2="86" stroke="#4FAF52" stroke-width="14" stroke-linecap="round"/>

  <!-- Person reclined on incline bench (side view) -->
  <!-- Torso (follows incline angle) -->
  <line x1="68" y1="148" x2="122" y2="90" stroke="#7CCF7A" stroke-width="22" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="132" cy="78" r="12" fill="#7CCF7A"/>

  <!-- Upper arm (static — hangs straight down from shoulder) -->
  <line x1="120" y1="92" x2="120" y2="130" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>

  <!-- Forearm (curls from hanging below bench to shoulder height) -->
  <line x1="120" y1="130" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="120;104;104;120" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="168;92;92;168" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Dumbbell -->
  <circle r="7" fill="#7CCF7A">
    <animate attributeName="cx" values="120;104;104;120" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="cy" values="168;92;92;168" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </circle>
</svg>
