<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Bench legs -->
  <rect x="30" y="138" width="10" height="36" rx="5" fill="#4FAF52"/>
  <rect x="160" y="138" width="10" height="36" rx="5" fill="#4FAF52"/>
  <!-- Bench pad -->
  <rect x="18" y="124" width="164" height="14" rx="7" fill="#7CCF7A"/>
  <!-- Uprights / rack -->
  <rect x="54" y="50" width="10" height="74" rx="5" fill="#4FAF52"/>
  <rect x="136" y="50" width="10" height="74" rx="5" fill="#4FAF52"/>

  <!-- Person lying on bench -->
  <circle cx="172" cy="115" r="12" fill="#7CCF7A"/>
  <rect x="28" y="113" width="132" height="10" rx="5" fill="#4FAF52"/>

  <!-- Left arm -->
  <line x1="76" y1="118" x2="58" y2="98" stroke="#4FAF52" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="58;62;62;58"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="98;60;60;98"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>
  <!-- Right arm -->
  <line x1="124" y1="118" x2="142" y2="98" stroke="#4FAF52" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="142;138;138;142"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="98;60;60;98"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Barbell (animated) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-38; 0,-38; 0,0"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Shaft -->
    <rect x="50" y="92" width="100" height="10" rx="5" fill="#4FAF52"/>
    <!-- Left plate outer -->
    <rect x="22" y="78" width="30" height="38" rx="8" fill="#7CCF7A"/>
    <rect x="28" y="84" width="18" height="26" rx="5" fill="#4FAF52"/>
    <!-- Right plate outer -->
    <rect x="148" y="78" width="30" height="38" rx="8" fill="#7CCF7A"/>
    <rect x="154" y="84" width="18" height="26" rx="5" fill="#4FAF52"/>
  </g>
</svg>
