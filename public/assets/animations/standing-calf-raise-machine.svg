<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Machine frame: two posts, top crossbar -->
  <rect x="14" y="28" width="10" height="146" rx="5" fill="#4FAF52"/>
  <rect x="176" y="28" width="10" height="146" rx="5" fill="#4FAF52"/>
  <rect x="10" y="28" width="180" height="10" rx="5" fill="#7CCF7A"/>

  <!-- Body (facing right — heel on left, toe on right) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-6; 0,-6; 0,0"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <circle cx="84" cy="46" r="12" fill="#7CCF7A"/>
    <rect x="76" y="58" width="16" height="52" rx="8" fill="#7CCF7A"/>
    <!-- Arms reaching right to grip the bar -->
    <line x1="82" y1="68" x2="114" y2="74" stroke="#7CCF7A" stroke-width="10" stroke-linecap="round"/>
    <line x1="90" y1="68" x2="130" y2="74" stroke="#7CCF7A" stroke-width="10" stroke-linecap="round"/>
    <!-- Thigh -->
    <line x1="84" y1="108" x2="88" y2="148" stroke="#4FAF52" stroke-width="13" stroke-linecap="round"/>
    <!-- Lower leg -->
    <line x1="88" y1="148" x2="92" y2="164" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- Machine handle bar (light green, on the right — fixed to frame) -->
  <rect x="114" y="68" width="62" height="12" rx="6" fill="#7CCF7A"/>

  <!-- Foot: heel(left) rises, ankle middle, toe(right) stays -->
  <path d="M 74 174 L 92 164 L 112 174" fill="none" stroke="#4FAF52" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="d"
      values="M 74 174 L 92 164 L 112 174; M 74 158 L 92 158 L 112 174; M 74 158 L 92 158 L 112 174; M 74 174 L 92 164 L 112 174"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </path>
</svg>
