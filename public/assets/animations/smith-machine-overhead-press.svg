<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Smith machine frame -->
  <rect x="22" y="18" width="14" height="156" rx="7" fill="#4FAF52"/>
  <rect x="164" y="18" width="14" height="156" rx="7" fill="#4FAF52"/>
  <rect x="22" y="16" width="156" height="14" rx="7" fill="#7CCF7A"/>
  <!-- Rails -->
  <rect x="38" y="18" width="6" height="140" rx="3" fill="#A4E6A3" opacity="0.6"/>
  <rect x="156" y="18" width="6" height="140" rx="3" fill="#A4E6A3" opacity="0.6"/>

  <!-- Person seated inside frame -->
  <rect x="62" y="142" width="76" height="14" rx="7" fill="#7CCF7A"/>
  <rect x="70" y="148" width="16" height="22" rx="8" fill="#4FAF52"/>
  <rect x="114" y="148" width="16" height="22" rx="8" fill="#4FAF52"/>
  <!-- Torso -->
  <rect x="86" y="80" width="28" height="62" rx="14" fill="#7CCF7A"/>
  <!-- Head -->
  <circle cx="100" cy="68" r="12" fill="#7CCF7A"/>

  <!-- Left arm (presses bar from chin level to overhead) -->
  <line x1="88" y1="92" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="56;62;62;56" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="86;36;36;86" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>
  <!-- Right arm -->
  <line x1="112" y1="92" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="144;138;138;144" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="86;36;36;86" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Barbell (guided on rails, animates up 50px) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-50;0,-50;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Shaft -->
    <rect x="44" y="82" width="112" height="8" rx="4" fill="#4FAF52"/>
    <!-- Left plate/collar -->
    <rect x="30" y="72" width="14" height="28" rx="5" fill="#7CCF7A"/>
    <!-- Right plate/collar -->
    <rect x="156" y="72" width="14" height="28" rx="5" fill="#7CCF7A"/>
  </g>
</svg>
