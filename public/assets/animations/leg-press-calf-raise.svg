<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>

  <!-- Machine back rest -->
  <rect x="14" y="50" width="16" height="96" rx="8" fill="#7CCF7A" transform="rotate(-18 22 98)"/>
  <!-- Seat -->
  <rect x="22" y="130" width="62" height="14" rx="7" fill="#7CCF7A"/>
  <!-- Frame base -->
  <rect x="14" y="142" width="82" height="14" rx="7" fill="#4FAF52"/>

  <!-- Head (against back rest) -->
  <circle cx="32" cy="86" r="12" fill="#7CCF7A"/>
  <!-- Torso -->
  <rect x="34" y="98" width="14" height="42" rx="7" fill="#7CCF7A"/>

  <!-- Foot plate group (moves slightly when feet press) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 4,-3; 4,-3; 0,0"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <rect x="150" y="52" width="24" height="88" rx="8" fill="#7CCF7A"/>
    <rect x="154" y="58" width="16" height="76" rx="6" fill="#4FAF52"/>
  </g>

  <!-- Legs: straight from hip down to BOTTOM of plate (feet at very bottom) -->
  <line x1="48" y1="106" x2="150" y2="132" stroke="#4FAF52" stroke-width="13" stroke-linecap="round"/>

  <!-- Foot: ankle to top-of-foot pressing plate — calf raise tracks plate movement -->
  <line x1="118" y1="132" stroke="#4FAF52" stroke-width="11" stroke-linecap="round">
    <animate attributeName="x2" values="150;154;154;150"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="122;119;119;122"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>
</svg>
