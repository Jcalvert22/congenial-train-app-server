<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Person seated, profile facing right -->
  <!-- Seat -->
  <rect x="54" y="140" width="78" height="14" rx="7" fill="#7CCF7A"/>
  <!-- Thighs -->
  <rect x="88" y="126" width="62" height="14" rx="7" fill="#4FAF52"/>
  <!-- Lower legs -->
  <rect x="138" y="138" width="12" height="36" rx="6" fill="#4FAF52"/>
  <!-- Torso -->
  <rect x="74" y="80" width="18" height="48" rx="9" fill="#7CCF7A"/>
  <!-- Head -->
  <circle cx="83" cy="70" r="12" fill="#7CCF7A"/>

  <!-- Upper arm (static, hanging at side) -->
  <line x1="82" y1="96" x2="82" y2="120" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>

  <!-- Forearm (animates from low to curled up — bicep curl) -->
  <line x1="82" y1="120" x2="100" y2="142" stroke="#7CCF7A" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="100;68;68;100"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="142;86;86;142"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Dumbbell at end of forearm -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; -32,-56; -32,-56; 0,0"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Handle -->
    <rect x="94" y="138" width="22" height="9" rx="4" fill="#4FAF52"/>
    <!-- Left head -->
    <rect x="88" y="132" width="10" height="21" rx="5" fill="#7CCF7A"/>
    <!-- Right head -->
    <rect x="114" y="132" width="10" height="21" rx="5" fill="#7CCF7A"/>
  </g>
</svg>
