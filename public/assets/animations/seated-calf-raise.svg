<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Bench (shorter, just under the person) -->
  <rect x="36" y="120" width="90" height="16" rx="8" fill="#7CCF7A"/>
  <!-- Weight pad on thigh -->
  <rect x="68" y="108" width="54" height="12" rx="6" fill="#4FAF52"/>

  <!-- Head -->
  <circle cx="58" cy="56" r="12" fill="#7CCF7A"/>
  <!-- Torso (seated upright) -->
  <rect x="50" y="68" width="16" height="52" rx="8" fill="#7CCF7A"/>
  <!-- Thigh (horizontal, shorter) -->
  <line x1="58" y1="120" x2="120" y2="120" stroke="#4FAF52" stroke-width="13" stroke-linecap="round"/>
  <!-- Lower leg (hangs down from knee) -->
  <line x1="120" y1="120" x2="122" y2="164" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>

  <!-- Foot: heel(back-left) - ankle - toe(forward-right), heel rises -->
  <path d="M 104 174 L 122 164 L 140 174" fill="none" stroke="#4FAF52" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="d"
      values="M 104 174 L 122 164 L 140 174; M 108 158 L 122 164 L 140 174; M 108 158 L 122 164 L 140 174; M 104 174 L 122 164 L 140 174"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </path>
</svg>
