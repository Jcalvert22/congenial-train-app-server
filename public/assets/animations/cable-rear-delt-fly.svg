<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Machine center column (behind person) -->
  <rect x="93" y="28" width="14" height="106" rx="7" fill="#4FAF52"/>

  <!-- Bench seat (rotated 90° — narrow, facing forward, in line with body) -->
  <rect x="84" y="134" width="32" height="14" rx="7" fill="#4FAF52"/>
  <!-- Bench legs (inverted V — wide at seat, converging toward floor) -->
  <line x1="88" y1="147" x2="96" y2="174" stroke="#4FAF52" stroke-width="10" stroke-linecap="round"/>
  <line x1="112" y1="147" x2="104" y2="174" stroke="#4FAF52" stroke-width="10" stroke-linecap="round"/>

  <!-- Arms rendered BEFORE torso so body covers them at starting (forward) position -->
  <!-- LEFT arm -->
  <line x1="82" y1="90" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="100;18;18;100" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="100;90;90;100" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>
  <!-- RIGHT arm -->
  <line x1="118" y1="90" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="100;182;182;100" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="100;90;90;100" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Torso (single clean shape, renders over arms when arms are forward) -->
  <rect x="84" y="80" width="32" height="54" rx="16" fill="#7CCF7A"/>
  <!-- Head -->
  <circle cx="100" cy="68" r="12" fill="#7CCF7A"/>

  <!-- Handles: only visible when arms are pulled back out to the sides -->
  <circle r="7" fill="#A4E6A3">
    <animate attributeName="cx" values="100;18;18;100" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="cy" values="100;90;90;100" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.35;0.45;0.55;0.65;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.8 0 1 1;0 0 1 1;0.8 0 1 1;0 0 1 1"/>
  </circle>
  <circle r="7" fill="#A4E6A3">
    <animate attributeName="cx" values="100;182;182;100" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="cy" values="100;90;90;100" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.35;0.45;0.55;0.65;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.8 0 1 1;0 0 1 1;0.8 0 1 1;0 0 1 1"/>
  </circle>
</svg>
