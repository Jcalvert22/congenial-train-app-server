<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Cable machine column (left, high pulley) -->
  <rect x="10" y="18" width="12" height="56" rx="6" fill="#4FAF52"/>
  <!-- High pulley -->
  <circle cx="16" cy="30" r="6" fill="#7CCF7A"/>

  <!-- Legs -->
  <line x1="95" y1="116" x2="78" y2="170" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <line x1="105" y1="116" x2="122" y2="170" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <!-- Torso -->
  <rect x="87" y="52" width="26" height="64" rx="13" fill="#7CCF7A"/>
  <!-- Head -->
  <circle cx="100" cy="40" r="12" fill="#7CCF7A"/>

  <!-- Cable from high pulley to left hand -->
  <line x1="16" y1="30" stroke="#7CCF7A" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x2" values="24;54;54;24" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="72;42;42;72" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Left upper arm (static, horizontal — elbow at shoulder height) -->
  <line x1="87" y1="72" x2="54" y2="72" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <!-- Left forearm (curls from extended toward machine to pointing up toward head) -->
  <line x1="54" y1="72" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="24;54;54;24" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="72;42;42;72" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Handle -->
  <circle r="5" fill="#4FAF52">
    <animate attributeName="cx" values="24;54;54;24" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="cy" values="72;42;42;72" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </circle>

  <!-- Right arm (passive, relaxed at side) -->
  <line x1="113" y1="72" x2="126" y2="112" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
</svg>
