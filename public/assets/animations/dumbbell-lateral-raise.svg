<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- V-shape legs spreading from hip to floor -->
  <line x1="95" y1="116" x2="78" y2="170" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <line x1="105" y1="116" x2="122" y2="170" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <!-- Torso -->
  <rect x="87" y="52" width="26" height="64" rx="13" fill="#7CCF7A"/>
  <!-- Head (overlaps torso top) -->
  <circle cx="100" cy="40" r="12" fill="#7CCF7A"/>

  <!-- Left arm (raises from hip to horizontal) -->
  <line x1="87" y1="72" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="72;26;26;72" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="108;72;72;108" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>
  <!-- Right arm -->
  <line x1="113" y1="72" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="128;174;174;128" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="108;72;72;108" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Left dumbbell (centered at ~(72,108), translate -46,-36 to reach ~(26,72)) -->
  <rect x="58" y="99" width="8" height="18" rx="4" fill="#7CCF7A">
    <animateTransform attributeName="transform" type="translate" values="0,0;-46,-36;-46,-36;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1" additive="sum"/>
  </rect>
  <rect x="65" y="104" width="14" height="8" rx="3" fill="#4FAF52">
    <animateTransform attributeName="transform" type="translate" values="0,0;-46,-36;-46,-36;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1" additive="sum"/>
  </rect>
  <rect x="78" y="99" width="8" height="18" rx="4" fill="#7CCF7A">
    <animateTransform attributeName="transform" type="translate" values="0,0;-46,-36;-46,-36;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1" additive="sum"/>
  </rect>

  <!-- Right dumbbell (centered at ~(128,108), translate +46,-36) -->
  <rect x="114" y="99" width="8" height="18" rx="4" fill="#7CCF7A">
    <animateTransform attributeName="transform" type="translate" values="0,0;46,-36;46,-36;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1" additive="sum"/>
  </rect>
  <rect x="121" y="104" width="14" height="8" rx="3" fill="#4FAF52">
    <animateTransform attributeName="transform" type="translate" values="0,0;46,-36;46,-36;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1" additive="sum"/>
  </rect>
  <rect x="134" y="99" width="8" height="18" rx="4" fill="#7CCF7A">
    <animateTransform attributeName="transform" type="translate" values="0,0;46,-36;46,-36;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1" additive="sum"/>
  </rect>
</svg>
