<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Machine center post -->
  <rect x="93" y="32" width="14" height="114" rx="7" fill="#4FAF52"/>
  <!-- Seat -->
  <rect x="62" y="144" width="76" height="14" rx="7" fill="#7CCF7A"/>
  <!-- Torso -->
  <rect x="86" y="88" width="28" height="58" rx="14" fill="#7CCF7A"/>
  <!-- Head -->
  <circle cx="100" cy="78" r="12" fill="#7CCF7A"/>

  <!-- Left thigh (animates outward left) -->
  <line x1="90" y1="142" x2="72" y2="166" stroke="#4FAF52" stroke-width="13" stroke-linecap="round">
    <animate attributeName="x2" values="72;34;34;72"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="166;164;164;166"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>
  <!-- Right thigh (animates outward right) -->
  <line x1="110" y1="142" x2="128" y2="166" stroke="#4FAF52" stroke-width="13" stroke-linecap="round">
    <animate attributeName="x2" values="128;166;166;128"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="166;164;164;166"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Left knee pad (animated outward) -->
  <circle cx="72" cy="166" r="9" fill="#A4E6A3">
    <animate attributeName="cx" values="72;34;34;72"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </circle>
  <!-- Right knee pad (animated outward) -->
  <circle cx="128" cy="166" r="9" fill="#A4E6A3">
    <animate attributeName="cx" values="128;166;166;128"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </circle>
</svg>
