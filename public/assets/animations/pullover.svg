<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>

  <!--
    VIEW: Side profile. Person seated facing LEFT, back against machine pad (right).
    Machine arm pivot at (126,95). Sweeps counter-clockwise (245°→76°):
      245° = handle upper-right (behind/at head level)
      180° = directly overhead (arc peak)
       76° = handle lower-left (pulled to chest level)
  -->

  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Seat legs -->
  <rect x="88" y="152" width="8" height="22" rx="4" fill="#4FAF52"/>
  <rect x="130" y="152" width="8" height="22" rx="4" fill="#4FAF52"/>
  <!-- Seat pad -->
  <rect x="74" y="140" width="72" height="12" rx="6" fill="#7CCF7A"/>

  <!-- Machine back pad (person leans against this) -->
  <rect x="120" y="76" width="18" height="68" rx="9" fill="#7CCF7A"/>

  <!-- Person torso (side profile, upright) -->
  <rect x="92" y="82" width="30" height="58" rx="10" fill="#4FAF52"/>

  <!-- Person head (facing left) -->
  <circle cx="108" cy="68" r="12" fill="#7CCF7A"/>

  <!-- Machine arm (rotates around (126,95)).
       Sweep: 245° (handle upper-right, behind/above head) → 76° (handle left, chest level)
       Going counter-clockwise (decreasing angle) through 180° (directly overhead).
       pad world: A=245°→(187,79), A=180°→(126,32), A=76°→(65,110)
       Arm x1,y1 = world shoulder (93,90) in local coords:
         lx = 126 - 33*cos(A) - 5*sin(A), ly = 95 + 33*sin(A) - 5*cos(A)
         A=245°: (145,67)  A=180°: (159,100)  A=76°: (113,126)
         Overhead at (245-180)/(245-76)=0.385 of sweep → keyTime=0.173 -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="245,126,95; 76,126,95; 76,126,95; 245,126,95"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <line x1="145" y1="67" x2="126" y2="158" stroke="#7CCF7A" stroke-width="12" stroke-linecap="round">
      <animate attributeName="x1" values="145;159;113;113;159;145"
        keyTimes="0;0.173;0.45;0.55;0.827;1" dur="2.8s" repeatCount="indefinite"
        calcMode="linear"/>
      <animate attributeName="y1" values="67;100;126;126;100;67"
        keyTimes="0;0.173;0.45;0.55;0.827;1" dur="2.8s" repeatCount="indefinite"
        calcMode="linear"/>
    </line>
    <!-- Arm rod -->
    <line x1="126" y1="95" x2="126" y2="157" stroke="#4FAF52" stroke-width="9" stroke-linecap="round"/>
    <!-- Handle/pad at end (drawn last so it sits on top of arm) -->
    <rect x="118" y="151" width="16" height="14" rx="6" fill="#7CCF7A"/>
  </g>
</svg>
