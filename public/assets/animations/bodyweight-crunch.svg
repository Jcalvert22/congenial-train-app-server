<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Static lower body: hips anchor, knees bent, feet flat -->
  <line x1="108" y1="166" x2="126" y2="166" stroke="#7CCF7A" stroke-width="14" stroke-linecap="round"/>
  <line x1="120" y1="166" x2="150" y2="142" stroke="#4FAF52" stroke-width="13" stroke-linecap="round"/>
  <line x1="150" y1="142" x2="162" y2="168" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>

  <!-- Upper body group: rotates CW around lower back (108,166) — head/chest curls toward knees -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="0 108 166; 38 108 166; 38 108 166; 0 108 166"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Upper spine (lies flat at rest, curls toward knees) -->
    <line x1="108" y1="166" x2="52" y2="162" stroke="#7CCF7A" stroke-width="14" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="40" cy="156" r="12" fill="#7CCF7A"/>
    <!-- Arms across chest -->
    <line x1="64" y1="164" x2="82" y2="170" stroke="#7CCF7A" stroke-width="9" stroke-linecap="round"/>
  </g>
</svg>
