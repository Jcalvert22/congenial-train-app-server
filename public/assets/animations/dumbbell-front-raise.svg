<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Leg (single, centered, facing right) -->
  <rect x="88" y="116" width="14" height="54" rx="7" fill="#4FAF52"/>
  <!-- Torso -->
  <rect x="84" y="50" width="22" height="66" rx="11" fill="#7CCF7A"/>
  <!-- Head (overlaps torso top) -->
  <circle cx="93" cy="38" r="12" fill="#7CCF7A"/>

  <!-- Working arm (raises forward from thigh to shoulder height) -->
  <line x1="106" y1="76" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="108;155;155;108" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="122;76;76;122" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Dumbbell (end-on circle at hand, represents dumbbell viewed from side) -->
  <circle r="9" fill="#7CCF7A">
    <animate attributeName="cx" values="108;155;155;108" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="cy" values="122;76;76;122" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </circle>
</svg>
