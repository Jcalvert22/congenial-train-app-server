<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Legs -->
  <line x1="95" y1="116" x2="78" y2="170" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <line x1="105" y1="116" x2="122" y2="170" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <!-- Torso -->
  <rect x="87" y="52" width="26" height="64" rx="13" fill="#7CCF7A"/>
  <!-- Head -->
  <circle cx="100" cy="40" r="12" fill="#7CCF7A"/>

  <!-- Left arm -->
  <line x1="88" y1="72" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="70;74;74;70" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="122;72;72;122" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>
  <!-- Right arm -->
  <line x1="112" y1="72" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="130;126;126;130" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="122;72;72;122" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- EZ-bar group (kinked bar + plates) — translates from hip to chest height -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-50;0,-50;0,0" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Left outer shaft -->
    <line x1="30" y1="118" x2="66" y2="118" stroke="#4FAF52" stroke-width="8" stroke-linecap="round"/>
    <!-- Left kink (angled grip zone) -->
    <line x1="66" y1="118" x2="74" y2="126" stroke="#4FAF52" stroke-width="8" stroke-linecap="round"/>
    <!-- Inner grip section (lower, neutral-grip zone) -->
    <line x1="74" y1="126" x2="126" y2="126" stroke="#4FAF52" stroke-width="8" stroke-linecap="round"/>
    <!-- Right kink -->
    <line x1="126" y1="126" x2="134" y2="118" stroke="#4FAF52" stroke-width="8" stroke-linecap="round"/>
    <!-- Right outer shaft -->
    <line x1="134" y1="118" x2="170" y2="118" stroke="#4FAF52" stroke-width="8" stroke-linecap="round"/>
    <!-- Left plate -->
    <rect x="10" y="106" width="22" height="24" rx="6" fill="#7CCF7A"/>
    <!-- Right plate -->
    <rect x="168" y="106" width="22" height="24" rx="6" fill="#7CCF7A"/>
  </g>
</svg>
