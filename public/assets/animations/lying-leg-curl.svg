<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Slanted bench raised to person level (head-end high, feet-end lower) -->
  <path d="M 14 84 L 162 90 L 162 98 L 14 92 Z" fill="#7CCF7A"/>
  <!-- Bench legs -->
  <rect x="22" y="92" width="8" height="82" rx="4" fill="#4FAF52"/>
  <rect x="122" y="98" width="8" height="76" rx="4" fill="#4FAF52"/>
  <!-- Head (lying prone, high/left end) -->
  <circle cx="34" cy="80" r="12" fill="#7CCF7A"/>
  <!-- Torso (horizontal) -->
  <rect x="46" y="74" width="72" height="16" rx="8" fill="#7CCF7A"/>
  <!-- Thigh (static, dark green) -->
  <line x1="118" y1="83" x2="156" y2="83" stroke="#4FAF52" stroke-width="13" stroke-linecap="round"/>
  <!-- Thigh anchor pad -->
  <rect x="116" y="75" width="42" height="16" rx="8" fill="#4FAF52"/>
  <!-- Lower leg (dark green, curls toward ceiling) -->
  <path d="M 156 83 L 168 84 L 184 88" fill="none" stroke="#4FAF52" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="d"
      values="M 156 83 L 168 84 L 184 88; M 156 83 L 156 68 L 152 50; M 156 83 L 156 68 L 152 50; M 156 83 L 168 84 L 184 88"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </path>
  <!-- Ankle roller (lightest color) -->
  <circle cx="184" cy="88" r="9" fill="#A4E6A3">
    <animate attributeName="cx" values="184;152;152;184"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="cy" values="88;50;50;88"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </circle>
</svg>
