<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>

  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Rack upright (head end, upper left) -->
  <rect x="18" y="18" width="10" height="152" rx="4" fill="#4FAF52"/>
  <!-- J-hook -->
  <rect x="18" y="62" width="22" height="8" rx="3" fill="#7CCF7A"/>

  <!-- Bench legs -->
  <rect x="142" y="154" width="12" height="16" rx="4" fill="#4FAF52"/>
  <rect x="90" y="124" width="12" height="46" rx="4" fill="#4FAF52"/>

  <!-- Bench surface (inclined ~30 degrees) -->
  <line x1="148" y1="158" x2="36" y2="96" stroke="#7CCF7A" stroke-width="16" stroke-linecap="round"/>

  <!-- Person lying on inclined bench -->
  <line x1="132" y1="152" x2="50" y2="100" stroke="#7CCF7A" stroke-width="14" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="42" cy="93" r="12" fill="#7CCF7A"/>

  <!-- Arm (close-grip style, perpendicular to incline surface) -->
  <line x1="82" y1="120" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="82;112;112;82"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="120;60;60;120"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Barbell plate (bar goes into screen — only plate face visible) -->
  <circle r="16" fill="#7CCF7A">
    <animate attributeName="cx" values="82;112;112;82"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="cy" values="120;60;60;120"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </circle>
</svg>
