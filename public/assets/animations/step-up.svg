<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Step platform -->
  <rect x="96" y="146" width="88" height="28" rx="8" fill="#7CCF7A"/>
  <rect x="100" y="140" width="80" height="10" rx="5" fill="#4FAF52"/>

  <!-- Person facing right -->
  <!-- Torso + head (bobs slightly upward as they step) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 26,-28; 26,-28; 0,0"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Torso -->
    <rect x="56" y="76" width="18" height="56" rx="9" fill="#7CCF7A"/>
    <!-- Head -->
    <circle cx="65" cy="66" r="12" fill="#7CCF7A"/>
  </g>

  <!-- Trailing leg (hip follows torso, foot stays on floor) -->
  <line x1="68" y1="132" x2="56" y2="172" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x1" values="68;94;94;68"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y1" values="132;104;104;132"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Lead leg (steps up onto platform) -->
  <path d="M 68 132 L 74 168 L 100 168" fill="none" stroke="#7CCF7A" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="d"
      values="M 68 132 L 74 168 L 100 168; M 94 104 L 122 130 L 144 140; M 94 104 L 122 130 L 144 140; M 68 132 L 74 168 L 100 168"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </path>
</svg>
