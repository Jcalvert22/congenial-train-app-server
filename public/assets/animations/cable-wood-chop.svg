<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Cable machine post (left side, high pulley) -->
  <rect x="14" y="28" width="10" height="146" rx="5" fill="#4FAF52"/>
  <circle cx="19" cy="44" r="7" fill="#7CCF7A"/>

  <!-- Lower body: front view, feet apart -->
  <!-- Left leg -->
  <line x1="103" y1="124" x2="90" y2="174" stroke="#4FAF52" stroke-width="13" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="117" y1="124" x2="132" y2="174" stroke="#4FAF52" stroke-width="13" stroke-linecap="round"/>
  <!-- Hip connector -->
  <rect x="96" y="116" width="28" height="14" rx="7" fill="#4FAF52"/>

  <!-- Torso -->
  <rect x="103" y="80" width="14" height="40" rx="7" fill="#7CCF7A"/>

  <!-- Head -->
  <circle cx="110" cy="66" r="12" fill="#7CCF7A"/>

  <!-- Cable rope: pulley to hands -->
  <line x1="26" y1="48" stroke="#A4E6A3" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x2" values="52;164;164;52"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="70;150;150;70"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Arms: both hands gripping, sweeping high-left to low-right -->
  <line x1="110" y1="88" stroke="#7CCF7A" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="52;164;164;52"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="70;150;150;70"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Grip handle indicator -->
  <circle r="6" fill="#4FAF52">
    <animate attributeName="cx" values="52;164;164;52"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="cy" values="70;150;150;70"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </circle>
</svg>
