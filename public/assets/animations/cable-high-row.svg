<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>

  <!-- Cable machine column (right side) -->
  <rect x="154" y="12" width="16" height="162" rx="8" fill="#4FAF52"/>
  <!-- Pulley at top -->
  <circle cx="162" cy="32" r="8" fill="#7CCF7A"/>

  <!-- Cable line from pulley to hand -->
  <line x1="162" y1="32" stroke="#7CCF7A" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x2" values="148;78;78;148" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="42;84;84;42" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Seat -->
  <rect x="54" y="140" width="54" height="12" rx="6" fill="#7CCF7A"/>
  <!-- Thighs -->
  <rect x="72" y="130" width="50" height="14" rx="7" fill="#7CCF7A"/>
  <!-- Lower legs -->
  <rect x="106" y="144" width="12" height="30" rx="6" fill="#4FAF52"/>
  <!-- Feet -->
  <rect x="104" y="172" width="18" height="4" rx="2" fill="#4FAF52"/>

  <!-- Torso -->
  <rect x="72" y="74" width="20" height="56" rx="10" fill="#7CCF7A"/>
  <!-- Head -->
  <circle cx="82" cy="62" r="11" fill="#7CCF7A"/>

  <!-- Arm line from shoulder to hand -->
  <line x1="74" y1="86" stroke="#4FAF52" stroke-width="11" stroke-linecap="round">
    <animate attributeName="x2" values="148;78;78;148" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="42;84;84;42" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Handle at hand -->
  <rect width="12" height="8" rx="4" fill="#7CCF7A">
    <animate attributeName="x" values="142;72;72;142" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y" values="38;80;80;38" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </rect>

  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>
</svg>
