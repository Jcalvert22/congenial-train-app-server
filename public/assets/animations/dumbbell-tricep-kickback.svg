<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Leg (upright, supporting hinged stance) -->
  <line x1="100" y1="132" x2="96" y2="170" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>

  <!-- Torso (hinged ~45° forward, facing left) -->
  <line x1="100" y1="132" x2="68" y2="94" stroke="#7CCF7A" stroke-width="16" stroke-linecap="round"/>

  <!-- Head (facing left, forward of shoulder) -->
  <circle cx="54" cy="82" r="12" fill="#7CCF7A"/>

  <!-- Upper arm (static — held parallel to floor, pointing backward = right) -->
  <line x1="68" y1="94" x2="108" y2="94" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>

  <!-- Forearm (hangs straight down → kicks back to horizontal) -->
  <line x1="108" y1="94" x2="108" y2="134" stroke="#4FAF52" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="108;148;148;108"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="134;94;94;134"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Dumbbell at hand (plate face + handle stub toward forearm) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="108,134;148,94;148,94;108,134"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Weight plate (face view) -->
    <circle cx="0" cy="0" r="10" fill="#7CCF7A"/>
  </g>
</svg>
