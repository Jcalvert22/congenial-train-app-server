<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Cable machine (right side) -->
  <rect x="154" y="30" width="30" height="100" rx="8" fill="#4FAF52"/>
  <!-- Cable pulley -->
  <circle cx="156" cy="110" r="8" fill="#7CCF7A"/>
  <!-- Foot plate -->
  <rect x="112" y="148" width="46" height="12" rx="6" fill="#7CCF7A"/>

  <!-- Person facing left (head left, seated) -->
  <!-- Seat -->
  <rect x="34" y="138" width="76" height="14" rx="7" fill="#7CCF7A"/>
  <!-- Thighs (going right toward foot plate) -->
  <rect x="62" y="122" width="60" height="16" rx="8" fill="#4FAF52"/>
  <!-- Lower legs (vertical to foot plate) -->
  <rect x="110" y="136" width="12" height="26" rx="6" fill="#4FAF52"/>
  <!-- Torso (slight forward lean at start, upright at contracted) -->
  <rect x="38" y="80" width="18" height="60" rx="9" fill="#7CCF7A"/>
  <!-- Head -->
  <circle cx="47" cy="70" r="12" fill="#7CCF7A"/>

  <!-- Arms (animate from extended toward machine to pulled back to chest) -->
  <line x1="56" y1="102" x2="148" y2="110" stroke="#4FAF52" stroke-width="11" stroke-linecap="round">
    <animate attributeName="x2" values="148;72;72;148"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="110;102;102;110"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Cable handle -->
  <rect x="142" y="104" width="14" height="12" rx="5" fill="#A4E6A3">
    <animate attributeName="x" values="142;64;64;142"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y" values="104;96;96;104"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </rect>
</svg>
