<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Single centered leg with knee bend -->
  <path d="M 90 112 L 87 150 L 85 174" fill="none" stroke="#4FAF52" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="d"
      values="M 90 112 L 87 150 L 85 174; M 90 112 L 83 148 L 81 174; M 90 112 L 83 148 L 81 174; M 90 112 L 87 150 L 85 174"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </path>
  <!-- Upper body hinges forward -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="0 90 112; 55 90 112; 55 90 112; 0 90 112"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Torso -->
    <rect x="82" y="58" width="16" height="52" rx="8" fill="#7CCF7A"/>
    <!-- Barbell on upper back (lightest circle, close to head) -->
    <circle cx="84" cy="62" r="10" fill="#A4E6A3"/>
    <!-- Head (on top) -->
    <circle cx="90" cy="46" r="12" fill="#7CCF7A"/>
  </g>
</svg>
