<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Leg (centered under hip) -->
  <rect x="90" y="116" width="14" height="54" rx="7" fill="#4FAF52"/>
  <!-- Torso (hinged ~45° forward) -->
  <line x1="97" y1="114" x2="62" y2="80" stroke="#7CCF7A" stroke-width="22" stroke-linecap="round"/>
  <!-- Head (overlaps torso top) -->
  <circle cx="50" cy="68" r="12" fill="#7CCF7A"/>

  <!-- Far arm (slightly behind, renders first — raises to parallel with back) -->
  <line x1="76" y1="93" stroke="#4FAF52" stroke-width="10" stroke-linecap="round" opacity="0.6">
    <animate attributeName="x2" values="76;78;78;76" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="148;76;76;148" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>
  <!-- Far dumbbell circle -->
  <circle r="7" fill="#7CCF7A" opacity="0.6">
    <animate attributeName="cx" values="76;78;78;76" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="cy" values="148;76;76;148" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </circle>

  <!-- Near arm (raises from hanging to level with back) -->
  <line x1="80" y1="97" stroke="#4FAF52" stroke-width="11" stroke-linecap="round">
    <animate attributeName="x2" values="80;82;82;80" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="152;80;80;152" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>
  <!-- Near dumbbell circle -->
  <circle r="8" fill="#7CCF7A">
    <animate attributeName="cx" values="80;82;82;80" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="cy" values="152;80;80;152" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </circle>
</svg>
