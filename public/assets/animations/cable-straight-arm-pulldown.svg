<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>

  <!-- Cable machine column (right side) -->
  <rect x="154" y="12" width="16" height="154" rx="8" fill="#4FAF52"/>
  <!-- Pulley -->
  <circle cx="162" cy="26" r="8" fill="#7CCF7A"/>

  <!-- Cable line from pulley to hands -->
  <line x1="162" y1="26" stroke="#7CCF7A" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x2" values="142;96;96;142" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="40;148;148;40" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Leg (centered under torso) -->
  <rect x="87" y="116" width="12" height="54" rx="6" fill="#4FAF52"/>

  <!-- Torso (centered between legs: leg centers at 86 and 100, mid=93) -->
  <rect x="82" y="52" width="22" height="64" rx="11" fill="#7CCF7A"/>

  <!-- Head (sits directly on torso) -->
  <circle cx="93" cy="40" r="12" fill="#7CCF7A"/>

  <!-- Arm (shoulder to hands, straight arm arc) -->
  <line x1="88" y1="66" stroke="#4FAF52" stroke-width="11" stroke-linecap="round">
    <animate attributeName="x2" values="142;96;96;142" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="40;148;148;40" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Bar at hands -->
  <rect width="22" height="6" rx="3" fill="#4FAF52">
    <animate attributeName="x" values="131;85;85;131" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y" values="37;145;145;37" keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </rect>

  <!-- Floor -->
  <rect x="10" y="170" width="180" height="10" rx="5" fill="#4FAF52"/>
</svg>
