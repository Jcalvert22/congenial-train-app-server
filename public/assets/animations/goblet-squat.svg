<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Far leg (behind, light green) -->
  <path d="M 106 118 L 114 152 L 124 174" fill="none" stroke="#7CCF7A" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="d"
      values="M 106 118 L 114 152 L 124 174; M 106 146 L 128 162 L 124 174; M 106 146 L 128 162 L 124 174; M 106 118 L 114 152 L 124 174"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </path>

  <!-- Person + dumbbell (torso group moves down as squat deepens) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,28; 0,28; 0,0"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Head (facing right) -->
    <circle cx="100" cy="50" r="12" fill="#7CCF7A"/>
    <!-- Torso (upright) -->
    <rect x="88" y="62" width="16" height="56" rx="8" fill="#7CCF7A"/>
    <!-- Arms bent holding dumbbell -->
    <line x1="93" y1="80" x2="118" y2="94" stroke="#4FAF52" stroke-width="9" stroke-linecap="round"/>
    <!-- Dumbbell plate top -->
    <rect x="110" y="78" width="18" height="10" rx="5" fill="#7CCF7A"/>
    <!-- Handle -->
    <rect x="115" y="86" width="8" height="18" rx="4" fill="#4FAF52"/>
    <!-- Dumbbell plate bottom -->
    <rect x="110" y="102" width="18" height="10" rx="5" fill="#7CCF7A"/>
  </g>

  <!-- Near leg (front, dark green) -->
  <path d="M 94 118 L 102 152 L 112 174" fill="none" stroke="#4FAF52" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="d"
      values="M 94 118 L 102 152 L 112 174; M 94 146 L 118 162 L 112 174; M 94 146 L 118 162 L 112 174; M 94 118 L 102 152 L 112 174"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </path>
</svg>
