<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>

  <!-- Angled machine back pad (diagonal) -->
  <rect x="110" y="22" width="18" height="130" rx="9" fill="#4FAF52" transform="rotate(22 119 87)"/>
  <!-- Shoulder stop bar -->
  <rect x="98" y="38" width="44" height="12" rx="6" fill="#7CCF7A" transform="rotate(22 120 44)"/>
  <!-- Foot platform at bottom -->
  <rect x="20" y="158" width="90" height="14" rx="7" fill="#7CCF7A"/>
  <!-- Platform guide rails -->
  <rect x="22" y="50" width="10" height="120" rx="5" fill="#4FAF52" transform="rotate(22 27 110)"/>

  <!-- Person body (moves down as squat deepens) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 14,28; 14,28; 0,0"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <!-- Head -->
    <circle cx="106" cy="36" r="12" fill="#7CCF7A"/>
    <!-- Torso (angled along back pad) -->
    <rect x="82" y="48" width="16" height="52" rx="8" fill="#7CCF7A" transform="rotate(22 90 74)"/>
  </g>

  <!-- Legs: path animates between extended and bent, feet stay on platform -->
  <path d="M 95 122 L 82 158 L 56 166" fill="none" stroke="#4FAF52" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="d"
      values="M 95 122 L 82 158 L 56 166; M 109 148 L 82 158 L 56 166; M 109 148 L 82 158 L 56 166; M 95 122 L 82 158 L 56 166"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </path>
</svg>
