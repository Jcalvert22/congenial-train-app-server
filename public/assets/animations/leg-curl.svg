<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Machine post -->
  <rect x="92" y="40" width="14" height="108" rx="7" fill="#4FAF52"/>
  <!-- Seat -->
  <rect x="54" y="138" width="80" height="14" rx="7" fill="#7CCF7A"/>
  <!-- Thigh rest pad (holds thighs down) -->
  <rect x="86" y="118" width="62" height="18" rx="9" fill="#4FAF52"/>
  <!-- Torso -->
  <rect x="80" y="76" width="18" height="46" rx="9" fill="#7CCF7A"/>
  <!-- Head -->
  <circle cx="89" cy="66" r="12" fill="#7CCF7A"/>

  <!-- Thigh (static, horizontal going right) -->
  <line x1="90" y1="130" x2="152" y2="130" stroke="#4FAF52" stroke-width="13" stroke-linecap="round"/>

  <!-- Lower leg (starts extended horizontal, curls down under seat) -->
  <line x1="152" y1="130" x2="188" y2="130" stroke="#7CCF7A" stroke-width="13" stroke-linecap="round">
    <animate attributeName="x2" values="188;150;150;188"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="130;168;168;130"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>

  <!-- Ankle pad -->
  <circle cx="188" cy="130" r="9" fill="#A4E6A3">
    <animate attributeName="cx" values="188;150;150;188"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="cy" values="130;168;168;130"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </circle>
</svg>
