<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect x="8" y="8" width="184" height="184" rx="40" fill="#A4E6A3" opacity="0.24"/>
  <!-- Floor -->
  <rect x="10" y="174" width="180" height="10" rx="5" fill="#4FAF52"/>
  <!-- Cable machine post -->
  <rect x="18" y="20" width="12" height="154" rx="6" fill="#4FAF52"/>
  <!-- Base -->
  <rect x="12" y="156" width="28" height="18" rx="9" fill="#4FAF52"/>
  <!-- Low pulley -->
  <circle cx="32" cy="164" r="7" fill="#7CCF7A"/>
  <!-- Both arms gripping machine (thick, clearly visible) -->
  <line x1="50" y1="68" x2="30" y2="62" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <line x1="50" y1="84" x2="30" y2="90" stroke="#4FAF52" stroke-width="12" stroke-linecap="round"/>
  <!-- Head (facing left toward machine) -->
  <circle cx="46" cy="44" r="12" fill="#7CCF7A"/>
  <!-- Torso -->
  <rect x="38" y="56" width="16" height="54" rx="8" fill="#7CCF7A"/>
  <!-- Standing leg (static) -->
  <path d="M 44 110 L 42 152 L 40 174" fill="none" stroke="#4FAF52" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cable (from low pulley to moving ankle) -->
  <line x1="32" y1="164" x2="58" y2="174" stroke="#4FAF52" stroke-width="3">
    <animate attributeName="x2" values="58;92;92;58"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
    <animate attributeName="y2" values="174;122;122;174"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </line>
  <!-- Curling leg (foot folds RIGHT behind left-facing person) -->
  <path d="M 50 110 L 54 152 L 58 174" fill="none" stroke="#4FAF52" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="d"
      values="M 50 110 L 54 152 L 58 174; M 50 110 L 68 146 L 92 122; M 50 110 L 68 146 L 92 122; M 50 110 L 54 152 L 58 174"
      keyTimes="0;0.45;0.55;1" dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.25 0 0.75 1;0 0 1 1;0.25 0 0.75 1"/>
  </path>
</svg>
